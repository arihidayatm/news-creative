version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: news-creative-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-news_creative}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-root}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - news-creative
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${DB_PASSWORD:-root}",
        ]
      timeout: 20s
      retries: 10
      interval: 10s

  # Optional: Redis cache service (can be added later)
  # redis:
  #   image: redis:7-alpine
  #   container_name: news-creative-redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   networks:
  #     - news-creative

volumes:
  mysql_data:
    driver: local

networks:
  news-creative:
    driver: bridge
